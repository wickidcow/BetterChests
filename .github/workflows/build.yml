name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build jar
        run: mvn --batch-mode --update-snapshots clean package
      - uses: actions/upload-artifact@v4
        with:
          name: BetterChests-Albion-2.0.4-26.2
          path: target/BetterChests-Albion-*.jar
